<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>26年RC</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚙</text></svg>">
<style>
  :root {
    --bg: #0a0c10;
    --surface: #111418;
    --text: #c0c5ce;
    --heading: #e8eaed;
    --accent: #58a6ff;
    --accent2: #79c0ff;
    --glow: rgba(88,166,255,0.15);
    --border: rgba(255,255,255,0.06);
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  html { scroll-behavior:smooth; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, "PingFang SC", "Microsoft YaHei", "Segoe UI", sans-serif;
    font-size: 16px;
    line-height: 1.7;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── 网格背景 ── */
  .bg-grid {
    position: fixed; top:0; left:0; width:100%; height:100%; z-index:0; pointer-events:none;
    background-image:
      linear-gradient(rgba(88,166,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(88,166,255,0.03) 1px, transparent 1px);
    background-size: 60px 60px;
  }
  .bg-grid::after {
    content:''; position:absolute; top:0; left:0; width:100%; height:100%;
    background: radial-gradient(ellipse 60% 50% at 50% 40%, transparent 40%, var(--bg) 100%);
  }

  /* ── 容器 ── */
  .page {
    position: relative; z-index:1;
    max-width: 900px; margin:0 auto; padding: 100px 28px 80px;
  }

  /* ── 标题区 ── */
  .hero {
    text-align: center;
    margin-bottom: 64px;
  }
  .hero h1 {
    font-size: clamp(36px, 6vw, 64px);
    font-weight: 800;
    letter-spacing: 2px;
    line-height: 1.15;
    background: linear-gradient(135deg, #e8eaed 0%, #58a6ff 50%, #79c0ff 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-size: 200% 200%;
    animation: gradientShift 6s ease-in-out infinite;
  }
  @keyframes gradientShift {
    0%,100% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
  }

  /* ── 标签 ── */
  .tags {
    margin-top: 28px;
    display: flex; justify-content:center; flex-wrap:wrap; gap:10px;
  }
  .tag {
    font-family: "SF Mono", "Fira Code", "Cascadia Code", "Consolas", monospace;
    font-size: 13px;
    color: var(--accent);
    background: rgba(88,166,255,0.06);
    border: 1px solid rgba(88,166,255,0.18);
    padding: 7px 18px;
    border-radius: 6px;
    cursor: default;
    transition: all 0.25s ease;
  }
  .tag:hover {
    background: rgba(88,166,255,0.14);
    border-color: rgba(88,166,255,0.4);
    transform: translateY(-2px);
    box-shadow: 0 4px 16px var(--glow);
  }

  /* ── 视频区 ── */
  .section {
    margin: 48px 0;
  }
  .section-label {
    display: flex; align-items:center; gap:14px;
    margin-bottom: 24px;
  }
  .section-label span {
    font-size: 14px;
    text-transform: uppercase;
    letter-spacing: 3px;
    color: var(--accent);
    white-space: nowrap;
  }
  .section-label::after {
    content:''; flex:1; height:1px;
    background: linear-gradient(90deg, rgba(88,166,255,0.25), transparent);
  }
  .video-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 20px;
  }
  .video-card {
    position: relative;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    overflow: hidden;
    box-shadow: 0 8px 40px rgba(0,0,0,0.4), 0 0 0 1px rgba(255,255,255,0.03) inset;
    transition: box-shadow 0.4s ease;
  }
  .video-card:hover {
    box-shadow: 0 12px 56px rgba(0,0,0,0.5), 0 0 40px var(--glow), 0 0 0 1px rgba(255,255,255,0.04) inset;
  }
  .video-wrap {
    position: relative;
    padding-bottom: 56.25%;
    height: 0;
  }
  .video-wrap iframe {
    position: absolute; top:0; left:0;
    width: 100%; height: 100%;
    border: none;
  }

  .actions {
    text-align: center;
    margin-top: 48px;
    display: flex; justify-content:center; flex-wrap:wrap; gap:16px;
  }
  .btn {
    display: inline-flex; align-items:center; gap:8px;
    font-family: "SF Mono", "Fira Code", "Cascadia Code", "Consolas", monospace;
    font-size: 14px;
    color: var(--accent);
    background: transparent;
    border: 1px solid rgba(88,166,255,0.25);
    padding: 12px 28px;
    border-radius: 8px;
    text-decoration: none;
    cursor: pointer;
    transition: all 0.3s ease;
    position: relative;
    overflow: hidden;
  }
  .btn::before {
    content:''; position:absolute; top:50%; left:50%;
    width:0; height:0; background:rgba(88,166,255,0.1);
    border-radius:50%; transform:translate(-50%,-50%);
    transition: width 0.5s ease, height 0.5s ease;
  }
  .btn:hover::before { width:400px; height:400px; }
  .btn:hover {
    color: #fff;
    border-color: var(--accent);
    box-shadow: 0 0 24px var(--glow), inset 0 0 24px rgba(88,166,255,0.06);
    transform: translateY(-2px);
  }
  .btn:hover .arrow { transform: translateX(4px); }
  .arrow {
    display: inline-block;
    transition: transform 0.3s ease;
  }

  /* ── 淡入动画 ── */
  @keyframes fadeUp {
    from { opacity:0; transform:translateY(24px); }
    to { opacity:1; transform:translateY(0); }
  }
  .reveal { animation: fadeUp 0.7s cubic-bezier(0.22,0.61,0.36,1) both; }
  .reveal:nth-child(1) { animation-delay: 0.05s; }
  .reveal:nth-child(2) { animation-delay: 0.15s; }
  .reveal:nth-child(3) { animation-delay: 0.25s; }
  .reveal:nth-child(4) { animation-delay: 0.35s; }
  .reveal:nth-child(5) { animation-delay: 0.45s; }
  .reveal:nth-child(6) { animation-delay: 0.55s; }

  /* ── 页脚 ── */
  .footer {
    text-align: center;
    padding: 60px 0 0;
    color: rgba(255,255,255,0.2);
    font-size: 13px;
    letter-spacing: 1px;
  }

  /* ── 社交链接 ── */
  .social {
    display: flex; justify-content:center; gap:20px;
    margin-top: 48px;
  }
  .social a {
    width: 44px; height: 44px;
    display: flex; align-items:center; justify-content:center;
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 12px;
    color: rgba(255,255,255,0.35);
    text-decoration: none;
    font-size: 20px;
    transition: all 0.3s ease;
  }
  .social a:hover {
    color: var(--accent);
    border-color: var(--accent);
    box-shadow: 0 0 20px var(--glow);
    transform: translateY(-3px);
  }

  /* ── 回到顶部 ── */
  .top-btn {
    position: fixed; bottom: 32px; right: 32px; z-index: 99;
    width: 44px; height: 44px;
    display: flex; align-items:center; justify-content:center;
    background: rgba(17,20,24,0.85);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 12px;
    color: rgba(255,255,255,0.5);
    font-size: 20px;
    cursor: pointer;
    opacity: 0;
    pointer-events: none;
    transition: all 0.3s ease;
    backdrop-filter: blur(8px);
  }
  .top-btn.visible {
    opacity: 1;
    pointer-events: auto;
  }
  .top-btn:hover {
    color: var(--accent);
    border-color: var(--accent);
    box-shadow: 0 0 20px var(--glow);
  }

  /* ── 响应式 ── */
  @media (max-width: 640px) {
    .page { padding: 60px 20px 60px; }
    .hero { margin-bottom: 40px; }
    .tag { font-size: 12px; padding: 5px 14px; }
    .btn { padding: 10px 22px; font-size: 13px; }
    .video-grid { grid-template-columns: 1fr; }
  }
</style>
