<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>26年RC</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: #0a0a0a;
    color: #ccc;
    font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
    min-height: 100vh;
  }
  .hero {
    text-align: center;
    padding: 80px 24px 48px;
  }
  .hero h1 {
    font-size: 48px;
    font-weight: 800;
    color: #fff;
    letter-spacing: 4px;
  }
  .hero .line {
    width: 60px;
    height: 3px;
    background: #00c4ff;
    margin: 20px auto;
  }
  .hero p {
    font-size: 16px;
    color: #777;
    letter-spacing: 2px;
  }
  .tags {
    margin-top: 24px;
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
    gap: 10px;
  }
  .tag {
    font-size: 12px;
    letter-spacing: 1px;
    color: #00c4ff;
    border: 1px solid #00c4ff33;
    padding: 6px 16px;
    border-radius: 20px;
  }
  .video-section {
    max-width: 900px;
    margin: 0 auto;
    padding: 0 24px 80px;
  }
  .video-section h2 {
    color: #fff;
    font-size: 20px;
    letter-spacing: 2px;
    margin-bottom: 24px;
    padding-left: 24px;
    border-left: 3px solid #00c4ff;
  }
  .video-wrap {
    position: relative;
    padding-bottom: 56.25%;
    height: 0;
    overflow: hidden;
    border-radius: 12px;
    background: #111;
    border: 1px solid #1a1a1a;
  }
  .video-wrap iframe {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    border: none;
  }
</style>
</head>
<body>

<div class="hero">
  <h1>26年RC</h1>
  <div class="tags">
    <span class="tag">STM32</span>
    <span class="tag">FreeRTOS</span>
    <span class="tag">CAN</span>
    <span class="tag">PID</span>
    <span class="tag">C</span>
    <span class="tag">Git</span>
  </div>
</div>

<div class="video-section">
  <h2>实车演示</h2>
  <div class="video-wrap">
    <iframe src="https://player.bilibili.com/player.html?isOutside=true&aid=116944946596839&bvid=BV14LKB6MEDC&cid=40092043466&p=1" scrolling="no" border="0" frameborder="no" framespacing="0" allowfullscreen="true"></iframe>
  </div>
</div>

<div style="text-align:center; padding:0 24px 80px;">
  <a href="https://github.com/Huangty-xixi/R2" target="_blank"
     style="color:#00c4ff; border:1px solid #00c4ff33; padding:10px 28px;
            border-radius:20px; text-decoration:none; font-size:14px; letter-spacing:1px;">
    查看项目源码 →
  </a>
</div>

</body>
</html>
